schema_version: 1
id: split_flac_cue_v1
name: Split FLAC/CUE album
description: |
  Разделить образ альбома (FLAC+CUE) на отдельные треки.
  Пример иллюстративный — для production требуется более точный CUE-парсер.
risk: local_write
shell_allowed: false
arguments:
  flac_file:
    type: file
    required: true
    extensions: ["flac", "FLAC"]
    description: FLAC image file (e.g. album.flac)
  cue_file:
    type: file
    required: true
    extensions: ["cue", "CUE"]
    description: CUE sheet file (e.g. album.cue)
  output_dir:
    type: directory
    required: false
    default: "./tracks"
    description: Output directory for split tracks
steps:
  - id: create_output_dir
    command: mkdir
    argv: ["-p", "${output_dir}"]
    description: Create output directory
  - id: split_tracks
    command: ffmpeg
    argv:
      - "-i"
      - "${flac_file}"
      - "-i"
      - "${cue_file}"
      - "-map"
      - "0:0"
      - "-c"
      - "copy"
      - "-f"
      - "segment"
      - "-segment_times"
      - "${segment_times}"
      - "-metadata"
      - "title=${track_title}"
      - "${output_dir}/track_%02d.flac"
    description: Split FLAC by CUE timings
    timeout_secs: 300
preconditions:
  - binary_exists: ffmpeg
  - file_exists: "${flac_file}"
  - file_exists: "${cue_file}"
  - path_creatable: "${output_dir}"
postconditions:
  - files_created_in: "${output_dir}"
  - min_files: 1
on_failure:
  cleanup_created_files: true
  preserve_logs: true
render:
  type: track_table
  columns:
    - key: track
      label: "#"
    - key: title
      label: Title
    - key: duration
      label: Duration
    - key: file
      label: File
fallback: agent
